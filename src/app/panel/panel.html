
 <div class="min-h-screen bg-gray-100 flex">
      <!-- Sidebar -->
      <aside 
        class="bg-gradient-to-b from-gray-900 to-gray-800 text-white transition-all duration-300 ease-in-out flex flex-col"
        [class.w-64]="!sidebarCollapsed"
        [class.w-20]="sidebarCollapsed"
      >
        <!-- Logo y título -->
        <div class="p-4 flex items-center justify-between border-b border-gray-700">
          <div class="flex items-center space-x-3 overflow-hidden">
            <svg class="h-8 w-8 text-blue-400 flex-shrink-0" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
            <span *ngIf="!sidebarCollapsed" class="font-bold text-xl whitespace-nowrap">Mi Panel</span>
          </div>
          <!-- Botón colapsar -->
          <button 
            (click)="toggleSidebar()"
            class="p-1 rounded-lg hover:bg-gray-700 transition-colors"
          >
            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path *ngIf="!sidebarCollapsed" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
              <path *ngIf="sidebarCollapsed" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7" />
            </svg>
          </button>
        </div>

        <!-- Menú de navegación -->
        <nav class="flex-1 p-4">
          <button
            class="w-full flex items-center space-x-3 px-3 py-3 rounded-lg bg-blue-600 group relative"
          >
            <!-- Icono -->
            <svg class="h-6 w-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
            
            <!-- Texto (solo visible cuando sidebar está expandido) -->
            @if (!sidebarCollapsed) {
              <span class="text-sm font-medium whitespace-nowrap">Clientes</span>
            }
            
            <!-- Tooltip cuando sidebar está colapsado -->
            @if (sidebarCollapsed) {
              <span class="absolute left-16 bg-gray-900 text-white text-xs rounded py-1 px-2 opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity duration-200 whitespace-nowrap z-50">
                Clientes
              </span>
            }
          </button>
        </nav>

        <!-- Footer del sidebar -->
        <div class="p-4 border-t border-gray-700">
          <button 
            (click)="logout()"
            class="w-full flex items-center space-x-3 px-3 py-3 rounded-lg hover:bg-red-600 transition-colors group relative"
          >
            <svg class="h-6 w-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            @if (!sidebarCollapsed) {
              <span class="text-sm font-medium">Cerrar sesión</span>
            }
            @if (sidebarCollapsed) {
              <span class="absolute left-16 bg-red-600 text-white text-xs rounded py-1 px-2 opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity duration-200 whitespace-nowrap">
                Cerrar sesión
              </span>
            }
          </button>
        </div>
      </aside>

      <!-- Contenido principal -->
      <main class="flex-1 overflow-auto">
        <!-- Header -->
        <header class="bg-white shadow-sm">
          <div class="px-6 py-4">
            <h1 class="text-2xl font-semibold text-gray-800">Clientes</h1>
          </div>
        </header>

        <!-- Contenido vacío -->
        <div class="p-6">
<div class="p-6">

  <div class="bg-white rounded-lg shadow overflow-x-auto">

    <table class="min-w-full divide-y divide-gray-200">

      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nombre</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Apellido</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Email</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Teléfono</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Fecha</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">URL</th>
        </tr>
      </thead>

      <tbody class="bg-white divide-y divide-gray-200">

        @for (cliente of clientes; track cliente.id) {

        <tr class="hover:bg-gray-50">

          <td class="px-6 py-4">{{cliente.nombre}}</td>
          <td class="px-6 py-4">{{cliente.apellido}}</td>
          <td class="px-6 py-4">{{cliente.email}}</td>
          <td class="px-6 py-4">{{cliente.telefono}}</td>

          <td class="px-6 py-4">
            {{cliente.createdAt | date:'short'}}
          </td>

          <td class="px-6 py-4">
            <a 
              [href]="cliente.url"
              target="_blank"
              class="text-blue-600 hover:underline"
            >
              Ver enlace
            </a>
          </td>

        </tr>

        }

      </tbody>

    </table>

  </div>

</div>
        </div>
      </main>
    </div>
